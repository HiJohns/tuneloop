# Nginx upload security hardening for media files
# Include this in your nginx server block, for example:
#   server {
#       listen 80;
#       server_name your-domain.com;
#       include /path/to/docs/nginx-uploads.conf;
#   }

# Serve media uploads from the /uploads/media/ directory
location /uploads/media/ {
    # Only allow image and video file extensions
    location ~* \.(jpg|jpeg|png|gif|webp|bmp|svg|ico|mp4|webm|mov|avi|mkv)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Deny all other file types (php, sh, exe, html, etc.)
    location ~* \. {
        deny all;
        return 403;
    }

    # Deny requests with no file extension
    location ~ /\. {
        deny all;
        return 403;
    }
}

# Also apply to the legacy /uploads/photos/ directory
location /uploads/photos/ {
    location ~* \.(jpg|jpeg|png|gif|webp|mp4|webm)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
    location ~* \. {
        deny all;
        return 403;
    }
}
